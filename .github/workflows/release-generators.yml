name: Release Generators

on:
  push:
    tags:
      - "*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe: ".exe"
          - os: macos-15
            target: aarch64-apple-darwin
            exe: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build generators
        run: cargo build --release --locked -p connect2axum-codegen --bins --target ${{ matrix.target }}

      - name: Package generators
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          package="connect2axum-codegen-${version}-${target}"
          out_dir="dist/${package}"
          mkdir -p "${out_dir}"

          bins=(
            protoc-gen-connect2rest
            protoc-gen-connect2ws
            protoc-gen-connect2openapi
            protoc-gen-connect2asyncapi
          )

          for bin in "${bins[@]}"; do
            src="target/${target}/release/${bin}${{ matrix.exe }}"
            cp "${src}" "${out_dir}/"
          done

          cp README.md LICENSE "${out_dir}/"

          archive="dist/${package}.tar.gz"
          tar -C dist -czf "${archive}" "${package}"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload generator archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-generators
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download generator archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
